<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>無人販売支援システム 管理画面</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>無人販売支援システム 管理画面</h1>
        <p>在庫・売上・通知状況を確認する画面</p>
    </header>

    <main>
        <section class="card">
            <h2>現在の在庫</h2>
            <table>
                <thead>
                    <tr>
                        <th>商品名</th>
                        <th>在庫数</th>
                    </tr>
                </thead>
                <tbody id="inventory-table">
                    {% for item, count in inventory.items() %}
                    <tr>
                        <td>{{ item }}</td>
                        <td>{{ count }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>

        <section class="card">
            <h2>在庫追加</h2>
            <div class="form-row">
                <div>
                    <label for="add-item-name">商品名</label>
                    <input type="text" id="add-item-name" placeholder="例：Tomato">
                </div>

                <div>
                    <label for="add-quantity">追加個数</label>
                    <input type="number" id="add-quantity" placeholder="例：5" min="1">
                </div>

                <button onclick="addInventory()">在庫を追加</button>
            </div>
        </section>

        <section class="card">
            <h2>売上履歴</h2>
            <table>
                <thead>
                    <tr>
                        <th>時刻</th>
                        <th>商品名</th>
                        <th>個数</th>
                        <th>金額</th>
                    </tr>
                </thead>
                <tbody id="sales-table">
                    {% for sale in sales_history %}
                    <tr>
                        <td>{{ sale.time }}</td>
                        <td>{{ sale.item_name }}</td>
                        <td>{{ sale.quantity }}</td>
                        <td>{{ sale.amount }} 円</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>

        <section class="card">
            <h2>動作テスト</h2>
            <button onclick="sendTestPurchase()">購入通知テスト</button>
            <button class="danger" onclick="sendTestShoplifting()">万引き通知テスト</button>
            <button class="ai-button" onclick="sendTestAIInventory()">AI認識結果テスト</button>
        </section>
    </main>

    <script>
        async function updateInventory() {
            const response = await fetch("/api/inventory");
            const inventory = await response.json();

            const table = document.getElementById("inventory-table");
            table.innerHTML = "";

            for (const [item, count] of Object.entries(inventory)) {
                table.innerHTML += `
                    <tr>
                        <td>${item}</td>
                        <td>${count}</td>
                    </tr>
                `;
            }
        }

        async function updateSales() {
            const response = await fetch("/api/sales");
            const sales = await response.json();

            const table = document.getElementById("sales-table");
            table.innerHTML = "";

            for (const sale of sales) {
                table.innerHTML += `
                    <tr>
                        <td>${sale.time}</td>
                        <td>${sale.item_name}</td>
                        <td>${sale.quantity}</td>
                        <td>${sale.amount} 円</td>
                    </tr>
                `;
            }
        }

        async function addInventory() {
            const itemName = document.getElementById("add-item-name").value;
            const quantity = Number(document.getElementById("add-quantity").value);

            if (!itemName || quantity <= 0) {
                alert("商品名と追加個数を正しく入力してください。");
                return;
            }

            const response = await fetch("/api/add_inventory", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    item_name: itemName,
                    quantity: quantity
                })
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("在庫を追加しました。");

                document.getElementById("add-item-name").value = "";
                document.getElementById("add-quantity").value = "";

                updateInventory();
            } else {
                alert("在庫追加に失敗しました。");
            }
        }

        async function sendTestPurchase() {
            await fetch("/api/purchase", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    item_name: "Tomato",
                    quantity: 2,
                    amount: 300
                })
            });

            updateInventory();
            updateSales();
        }

        async function sendTestShoplifting() {
            await fetch("/api/shoplifting", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    item_name: "Tomato",
                    quantity: 2,
                    shortage_amount: 300
                })
            });
        }

        async function sendTestAIInventory() {
            await fetch("/api/ai_inventory", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    items: [
                        { item_name: "Tomato", count: 6 },
                        { item_name: "Cucumber", count: 4 },
                        { item_name: "Eggplant", count: 3 },
                        { item_name: "Bell Pepper", count: 5 }
                    ]
                })
            });

            updateInventory();
        }

        setInterval(() => {
            updateInventory();
            updateSales();
        }, 5000);
    </script>
</body>
</html>
