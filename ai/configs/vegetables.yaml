# YOLOv8 データセット設定ファイル
# ultralytics形式: https://docs.ultralytics.com/datasets/
#
# ★野菜を追加するときは、このファイルだけ編集すればよい★
#   1. nc を実際のクラス数に合わせる
#   2. names に「id: 英語名」を連番(0始まり)で追加
#   3. names_ja に「英語名: 日本語表示名」を追加（推論結果の表示用・本プロジェクト独自キー）
#   4. dataset/labels のアノテーションも同じ id を使う
# yolo_inference.py / train.py はここを読み込むのでコード側の修正は不要。

path: ../dataset          # dataset root (ai/dataset)
train: images/train
val: images/val

# クラス定義 (id: 英語名)
# ★ Roboflow データセット (vegetables-kacga v3, 26クラス) のIDに合わせている ★
# 学習は data.yaml (26クラス全体) で行い、推論時にここの4種だけ表示・集計する。
nc: 26
names:
  0: avocado
  1: beans
  2: beet
  3: bell pepper   # ピーマン
  4: broccoli
  5: brus capusta
  6: cabbage
  7: carrot
  8: cayliflower
  9: celery
  10: corn
  11: cucumber     # きゅうり
  12: eggplant     # なす
  13: fasol
  14: garlic
  15: hot pepper
  16: onion
  17: peas
  18: potato
  19: pumpkin
  20: rediska
  21: redka
  22: salad
  23: squash-patisson
  24: tomato       # トマト
  25: vegetable marrow

# 推論時に表示・集計する対象クラス（4種のみ）
# yolo_inference.py はここを参照して他クラスを無視する
target_names:
  - tomato
  - cucumber
  - eggplant
  - bell pepper

# 日本語表示名 ※本プロジェクト独自キー。ultralytics は無視する。
names_ja:
  tomato: トマト
  cucumber: きゅうり
  eggplant: なす
  bell pepper: ピーマン
